// ── Cloud sync — JSONbin.io ───────────────────────────────────────────────────
const JBIN = "https://api.jsonbin.io/v3/b";

async function cloudPush(apiKey, binId, payload) {
  const url  = binId ? `${JBIN}/${binId}` : JBIN;
  const hdrs = {"Content-Type":"application/json","X-Master-Key":apiKey,"X-Bin-Private":"true"};
  if (!binId) hdrs["X-Bin-Name"] = "mon-portfolio";
  const r = await fetch(url, {method:binId?"PUT":"POST", headers:hdrs, body:JSON.stringify(payload)});
  if (!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json();
  return binId || j.metadata?.id;
}

async function cloudPull(apiKey, binId) {
  const r = await fetch(`${JBIN}/${binId}/latest`, {headers:{"X-Master-Key":apiKey}});
  if (!r.ok) throw new Error("HTTP "+r.status);
  return (await r.json()).record;
}

function sliceByInterval(vals, intervalKey) {
  const n = vals.length;
  if (!n) return { vals, startIdx:0 };
  const iv = INTERVALS.find(i => i.key === intervalKey);
  if (!iv || iv.key === "MAX") return { vals, startIdx:0 };

  const today = new Date();
  let cutDate;
  if (iv.ytd) {
    cutDate = new Date(today.getFullYear(), 0, 1);
  } else {
    cutDate = new Date(today);
    cutDate.setMonth(cutDate.getMonth() - iv.months);
  }

  // Trouver le premier index >= cutDate
  let startIdx = 0;
  for (let i = 0; i < n; i++) {
    const d = HIST_DATES[Math.min(i, HIST_DATES.length-1)];
    if (d >= cutDate) { startIdx = i; break; }
    startIdx = n - 1;
  }
  // Garantir au moins 2 points
  if (n - startIdx < 2) startIdx = Math.max(0, n - 2);
  return { vals: vals.slice(startIdx), startIdx };
}

function sliceByRealDates(dates, vals, intervalKey) {
  const n = vals.length;
  if (n < 2) return { vals, dates, startIdx: 0 };
  const iv = INTERVALS.find(i => i.key === intervalKey);
  if (!iv || iv.key === "MAX") return { vals, dates, startIdx: 0 };
  const today = new Date();
  let cutDate;
  if (iv.ytd) {
    cutDate = new Date(today.getFullYear(), 0, 1);
  } else {
    cutDate = new Date(today);
    cutDate.setMonth(cutDate.getMonth() - iv.months);
  }
  let startIdx = 0;
  for (let i = 0; i < n; i++) {
    if (dates[i] >= cutDate) { startIdx = i; break; }
    if (i === n - 1) startIdx = Math.max(0, n - 2);
  }
  if (n - startIdx < 2) startIdx = Math.max(0, n - 2);
  return { vals: vals.slice(startIdx), dates: dates.slice(startIdx), startIdx };
}

// Stooq CSV — tous les marchés (US, EU, FR, indices)
// Format ticker Stooq = ticker Yahoo en minuscules, ex: cw8.pa, aapl, ^gspc → %5egspc
async function src_stooq(ticker) {
  // Essayer plusieurs formats Stooq (certains ETF utilisent .fr au lieu de .pa)
  const variants = [];
  const t = ticker.trim().toLowerCase().replace("^","%5e");
  variants.push(t);
  // Si .pa → essayer aussi sans suffixe et avec .fr
  if (t.endsWith(".pa")) {
    variants.push(t.replace(".pa", ".fr"));
    variants.push(t.replace(".pa", ""));
  }
  for (const s of variants) {
    try {
      const res = await fetch(
        `https://stooq.com/q/l/?s=${s}&f=sd2t2ohlcv&h&e=csv`,
        { signal: AbortSignal.timeout(7000) }
      );
      if (!res.ok) continue;
      const csv  = await res.text();
      const rows = csv.trim().split("\n");
      if (rows.length < 2) continue;
      const cols = rows[1].split(",");
      const p = parseFloat(cols[6]);
      if (p > 0 && !isNaN(p)) return p;
    } catch { continue; }
  }
  return null;
}

// ── Détection ISIN (12 chars : 2 lettres + 10 alphanum) ──────────────────────
function isISIN(t) {
  return /^[A-Z]{2}[A-Z0-9]{10}$/i.test(t.trim());
}

// Source ISIN via Boursorama — VL fonds non cotés (OPCVM, FCPI, etc.)
// Boursorama utilise le préfixe "0P" + code interne, ou directement l'ISIN
// On passe par leur endpoint de cotation OPCVM
async function src_boursorama_isin(ticker) {
  const t = ticker.trim().toUpperCase();
  if (!isISIN(t)) return null;
  // Format Boursorama pour OPCVM : "0P" prefix via leur API de recherche
  try {
    // 1. Chercher le symbole Boursorama à partir de l'ISIN
    const searchRes = await fetch(
      `${CORS_PROXY}https://www.boursorama.com/recherche/ajax?query=${t}&limit=5`,
      { signal: AbortSignal.timeout(8000) }
    );
    if (!searchRes.ok) throw new Error("search failed");
    const searchData = await searchRes.json();
    const items = searchData?.items || searchData?.data || searchData || [];
    const found = Array.isArray(items) ? items.find(i =>
      i.isin === t || i.symbol?.includes(t) || i.ticker === t
    ) : null;
    const sym = found?.symbol || found?.ticker;
    if (!sym) throw new Error("symbol not found");

    // 2. Récupérer la VL avec le symbole trouvé
    const quotRes = await fetch(
      `${CORS_PROXY}https://www.boursorama.com/bourse/action/graph/ws/GetTicksEOD?symbol=${sym}&length=5&period=0&guid=`,
      { signal: AbortSignal.timeout(8000) }
    );
    if (!quotRes.ok) throw new Error("quote failed");
    const qData = await quotRes.json();
    const ticks = qData?.d?.qd;
    if (!ticks?.length) throw new Error("no ticks");
    const p = parseFloat(ticks[ticks.length-1]?.c || ticks[ticks.length-1]?.l);
    if (p > 0) return p;
    throw new Error("invalid price");
  } catch {}

  // Fallback : endpoint direct ISIN Boursorama OPCVM
  try {
    const res = await fetch(
      `${CORS_PROXY}https://www.boursorama.com/cours/${t}/`,
      { signal: AbortSignal.timeout(8000) }
    );
    if (!res.ok) return null;
    const html = await res.text();
    // Chercher la VL dans le HTML — format : "123,45 EUR" ou data-last="123.45"
    const m = html.match(/data-last="([\d\.]+)"/)
      || html.match(/class="[^"]*c-instrument__value[^"]*"[^>]*>([\d\s,\.]+)/)
      || html.match(/"lastPrice"\s*:\s*([\d\.]+)/)
      || html.match(/Valeur\s+liquidative[^>]*>[^<]*([\d\s,\.]+)/i);
    if (!m) return null;
    const p = parseFloat(m[1].replace(/\s/g,"").replace(",","."));
    return p > 0 ? p : null;
  } catch { return null; }
}

// ── Course parallèle — prend le 1er résultat valide ──────────────────────────
async function fetchPriceRace(ticker) {
  const t = ticker.trim();
  if (!t) return null;

  // Sélectionner les sources à lancer selon le type de ticker
  const isEU = /\.(PA|AS|DE|L|MI|BR|MC|HE|ST|CO|OL|AX|HK|T)$/i.test(t) || t.startsWith("^");
  const sources = isCrypto(t)
    ? [src_coingecko(t)]
    : isISIN(t)
      ? [src_boursorama_isin(t), src_stooq(t), src_fmp(t)]
      : isEU
        ? [src_euronext_chart(t), src_euronext(t), src_stooq(t), src_boursorama(t), src_fmp(t), src_twelve(t), src_yahoo(t)]
        : [src_twelve(t), src_fmp(t), src_stooq(t), src_yahoo(t)];

  return new Promise((resolve) => {
    let done = false;
    let pending = sources.length;

    sources.forEach(promise => {
      promise.then(price => {
        pending--;
        if (!done && price && price > 0) {
          done = true;
          resolve(price);
        } else if (!done && pending === 0) {
          resolve(null);
        }
      }).catch(() => {
        pending--;
        if (!done && pending === 0) resolve(null);
      });
    });
  });
}

// Batch CoinGecko (plus efficace pour les cryptos)
async function fetchCoinGeckoBatch(invList) {
  const results = {};
  const ids = [...new Set(invList.map(i => COINGECKO_IDS[i.ticker.trim().toUpperCase()]).filter(Boolean))];
  if (!ids.length) return results;
  try {
    const res  = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=eur,usd`,
      { signal: AbortSignal.timeout(8000) }
    );
    const data = await res.json();
    for (const inv of invList) {
      const t   = inv.ticker.trim().toUpperCase();
      const id  = COINGECKO_IDS[t];
      const cur = t.endsWith("-USD") ? "usd" : "eur";
      const p   = data?.[id]?.[cur];
      results[inv.id] = p > 0 ? { price: p, ok: true } : { ok: false };
    }
  } catch { invList.forEach(inv => { results[inv.id] = { ok: false }; }); }
  return results;
}

// ── Dispatcher principal ──────────────────────────────────────────────────────
async function fetchAllPrices(toUpdate, onProgress) {
  const results = {};
  if (!toUpdate.length) return results;
  toUpdate.forEach(inv => onProgress(inv.id, "loading"));

  // Cryptos en batch CoinGecko (plus efficace)
  const cryptoList = toUpdate.filter(i => isCrypto(i.ticker));
  if (cryptoList.length) {
    const r = await fetchCoinGeckoBatch(cryptoList);
    for (const inv of cryptoList) {
      results[inv.id] = r[inv.id] || { ok: false };
      onProgress(inv.id, r[inv.id]?.ok ? "ok" : "error");
    }
  }

  // Tous les autres : course parallèle par batch de 5
  const otherList = toUpdate.filter(i => !isCrypto(i.ticker));
  for (let i = 0; i < otherList.length; i += 5) {
    await Promise.all(otherList.slice(i, i+5).map(async inv => {
      const p = await fetchPriceRace(inv.ticker);
      results[inv.id] = p ? { price: p, ok: true } : { ok: false };
      onProgress(inv.id, p ? "ok" : "error");
    }));
    // Petite pause entre les batchs pour éviter le rate limiting
    if (i + 5 < otherList.length) await new Promise(r => setTimeout(r, 200));
  }

  return results;
}

// Fonction unitaire (formulaire)
async function fetchPrice(ticker) {
  if (!ticker?.trim()) return null;
  const p = isCrypto(ticker.trim())
    ? (await fetchCoinGeckoBatch([{id:0,ticker:ticker.trim()}]))[0]?.price
    : await fetchPriceRace(ticker.trim());
  return p ? { price: p } : null;
}

// ── DonutChart ────────────────────────────────────────────────────────────────
function DonutChart({ data, T }) {
  const total = data.reduce((s,d)=>s+d.value,0);
  if (!total) return null;
  let cum = 0;
  const toXY = (p) => { const a=p*2*Math.PI-Math.PI/2; return [50+40*Math.cos(a),50+40*Math.sin(a)]; };
  return (
    <svg viewBox="0 0 100 100" style={{width:130,height:130,flexShrink:0}}>
      {data.map(d=>{
        const start=cum; cum+=d.value/total;
        const [x1,y1]=toXY(start),[x2,y2]=toXY(cum);
        return <path key={d.label} d={"M50,50 L"+x1+","+y1+" A40,40 0 "+(cum-start>0.5?1:0)+",1 "+x2+","+y2+" Z"} fill={d.color} opacity={0.9}/>;
      })}
      <circle cx="50" cy="50" r="22" fill={T.donutHole}/>
      <text x="50" y="49" textAnchor="middle" fill={T.textDim} fontSize="5.5">{data.length}</text>
      <text x="50" y="55" textAnchor="middle" fill={T.textDim} fontSize="4.5">actifs</text>
    </svg>
  );
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function Sparkline({ values }) {
  if (!values||values.length<2) return <span style={{color:"#475569"}}>-</span>;
  const mn=Math.min(...values),mx=Math.max(...values),rng=mx-mn||1;
  const pts=values.map((v,i)=>((i/(values.length-1))*60)+","+(16-((v-mn)/rng)*14)).join(" ");
  const col=values[values.length-1]>=values[0]?"#34d399":"#f87171";
  return <svg viewBox="0 0 60 18" style={{width:60,height:18}}><polyline points={pts} fill="none" stroke={col} strokeWidth="1.8" strokeLinejoin="round"/></svg>;
}

    .filter(([k]) => activeIndices.includes(k))

        key:k, label:idx.label, color:idx.color,
        norm: sliced.map(v=>(v/sliced[0])*100),

// ── Données historiques hebdomadaires Yahoo Finance (indices) ─────────────────
const YAHOO_IDX_TICKERS = { SP500:'%5EGSPC', NDX:'%5ENDX', CAC40:'%5EFCHI', GOLD:'GC%3DF' };

async function fetchWeeklyHistory(yahooTicker, range='max') {
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${yahooTicker}?interval=1wk&range=${range}&includePrePost=false`;
  const proxies = [
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(base)}`,
    `https://corsproxy.io/?${encodeURIComponent(base)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(13000) });
      if (!res.ok) continue;
      const data = await res.json();
      const result = data?.chart?.result?.[0];
      if (!result) continue;
      const ts = result.timestamp;
      const closes = result.indicators?.quote?.[0]?.close;
      if (!ts?.length || !closes?.length) continue;
      const pts = ts.map((t,i) => ({ date: new Date(t*1000), val: closes[i] }))
                    .filter(p => p.val != null && !isNaN(p.val) && p.val > 0);
      if (pts.length > 2) return pts;
    } catch { continue; }
  }
  return null;
}

function intervalToYahooRange(k) {
  return {'1M':'1mo','3M':'3mo','6M':'6mo','YTD':'ytd','1A':'1y','2A':'2y','5A':'5y','10A':'10y','MAX':'max'}[k]||'max';
}

// ── Cours historiques hebdomadaires pour un actif du portefeuille ─────────────
async function fetchTickerWeeklyHistory(ticker) {
  const t = ticker?.trim();
  if (!t) return null;

  // Crypto via CoinGecko (historique weekly)
  const cgId = COINGECKO_IDS[t.toUpperCase()];
  if (cgId) {
    const cur = t.toUpperCase().endsWith('-USD') ? 'usd' : 'eur';
    try {
      const res = await fetch(
        `https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=${cur}&days=max&interval=weekly`,
        { signal: AbortSignal.timeout(12000) }
      );
      if (res.ok) {
        const data = await res.json();
        const pts = (data?.prices||[]).map(([ts,val])=>({date:new Date(ts),val})).filter(p=>p.val>0);
        if (pts.length > 5) return pts;
      }
    } catch {}
  }

  // ETF/Actions via Stooq (weekly historical CSV) - pas de CORS
  const stooqT = t.toLowerCase().replace(/,/g,'%2C');
  const variants = [stooqT];
  if (stooqT.endsWith('.pa')) { variants.push(stooqT.replace('.pa','.fr')); variants.push(stooqT.replace('.pa','')); }
  for (const s of variants) {
    try {
      const res = await fetch(`https://stooq.com/q/d/l/?s=${s}&f=d&i=w`, { signal: AbortSignal.timeout(9000) });
      if (!res.ok) continue;
      const csv = await res.text();
      const rows = csv.trim().split('\n');
      if (rows.length < 3) continue;
      const pts = rows.slice(1).map(row => {
        const cols = row.split(',');
        if (cols.length < 5) return null;
        const d = new Date(cols[0]), v = parseFloat(cols[4]);
        return (!isNaN(d) && v > 0) ? { date: d, val: v } : null;
      }).filter(Boolean).sort((a,b) => a.date - b.date);
      if (pts.length > 5) return pts;
    } catch { continue; }
  }

  // Fallback : Yahoo Finance via proxy CORS
  const yt = encodeURIComponent(t);
  return fetchWeeklyHistory(yt, 'max');
}

// ── Construction des valeurs hebdomadaires réelles du compte ──────────────────
// Utilise les cours historiques si disponibles, sinon interpolation linéaire
function buildWeeklyAccountValsFromHistory(invs, portfolioHistData, intervalKey) {
  if (!invs?.length) return [];
  const today = new Date();
  const iv = INTERVALS.find(i => i.key === intervalKey);
  let startDate;
  if (!iv || iv.key === 'MAX') {
    const first = Math.min(...invs.filter(i=>i.date).map(i=>new Date(i.date).getTime()));
    startDate = isFinite(first) ? new Date(first) : new Date(today.getFullYear()-2,0,1);
  } else if (iv.ytd) {
    startDate = new Date(today.getFullYear(), 0, 1);
  } else {
    startDate = new Date(today);
    startDate.setMonth(startDate.getMonth() - iv.months);
  }

  // Générer les vendredis de la période
  const cur = new Date(startDate);
  const dow = cur.getDay();
  if (dow !== 5) cur.setDate(cur.getDate() + ((5 - dow + 7) % 7 || 7));
  const fridays = [];
  while (cur <= today) { fridays.push(new Date(cur)); cur.setDate(cur.getDate() + 7); }
  if (!fridays.length || fridays[fridays.length-1].toDateString() !== today.toDateString())
    fridays.push(new Date(today));

  // Pré-indexer les données historiques par ticker pour performance
  const histMaps = {};
  for (const inv of invs) {
    const tk = inv.ticker?.trim();
    if (!tk || histMaps[tk] !== undefined) continue;
    const hist = portfolioHistData?.[tk];
    if (hist?.length) {
      // Trier par date, construire tableau pour recherche rapide
      const sorted = [...hist].sort((a,b) => a.date - b.date);
      histMaps[tk] = sorted;
    } else {
      histMaps[tk] = null;
    }
  }

  // Trouver le cours le plus proche d'une date cible (tolérance ±4 jours)
  const getPriceOn = (ticker, targetDate) => {
    const sorted = histMaps[ticker?.trim()];
    if (!sorted) return null;
    const tgt = targetDate.getTime();
    let lo = 0, hi = sorted.length - 1, best = null, bestDiff = 4*24*3600*1000;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const diff = Math.abs(sorted[mid].date.getTime() - tgt);
      if (diff < bestDiff) { bestDiff = diff; best = sorted[mid].val; }
      if (sorted[mid].date.getTime() < tgt) lo = mid + 1; else hi = mid - 1;
    }
    return best;
  };

  return fridays.map(friday => {
    const totalVal = invs.reduce((sum, inv) => {
      if (!inv.date || !inv.quantity) return sum;
      const buyDate = new Date(inv.date);
      if (friday < buyDate) return sum;

      // Cours historique réel disponible ?
      const histPrice = getPriceOn(inv.ticker, friday);
      if (histPrice != null && histPrice > 0) {
        return sum + histPrice * inv.quantity;
      }

      // Interpolation linéaire (fallback si pas de données historiques)
      const buyVal = (inv.buyPrice ?? 0) * inv.quantity;
      const curVal = ((inv.currentPrice ?? inv.buyPrice) ?? 0) * inv.quantity;
      const span = today.getTime() - buyDate.getTime();
      if (span <= 0) return sum + curVal;
      const t2 = Math.min((friday.getTime() - buyDate.getTime()) / span, 1);
      return sum + buyVal + (curVal - buyVal) * t2;
    }, 0);
    return { date: friday, val: totalVal };
  }).filter(p => p.val > 0);
}

// ── Graphique comparatif hebdomadaire (compte + indices) ──────────────────────
function ComparisonChartWeekly({ id, accountPts, indexHistData, activeIndices, indexHistLoading, portfolioHistLoading, T }) {
  const W=700, H=120, P=6;
  if (!accountPts?.length || accountPts.length < 2) {
    if (portfolioHistLoading) return (
      <div style={{textAlign:"center",padding:"24px 0",color:T.textMuted,fontSize:12}}>
        <span style={{display:"inline-block",animation:"spin 1s linear infinite",marginRight:6}}>⟳</span>
        Chargement des cours historiques…
      </div>
    );
    return null;
  }
  const baseVal = accountPts[0].val;
  if (!baseVal || baseVal <= 0) return null;
  const n = accountPts.length;
  const aN = accountPts.map(p => p.val / baseVal * 100);
  const startDate = accountPts[0].date;
  const endDate   = accountPts[n-1].date;
  const dateRange = Math.max(endDate - startDate, 1);

  const indexSeries = Object.entries(INDICES)
    .filter(([k]) => activeIndices.includes(k))
    .map(([k, idx]) => {
      const hist = indexHistData?.[k];
      if (!hist?.length) return null;
      const filtered = hist.filter(p => p.date >= startDate && p.date <= endDate);
      if (filtered.length < 2) return null;
      const base = filtered[0].val;
      if (!base || base <= 0) return null;
      return { key:k, label:idx.label, color:idx.color,
               dates: filtered.map(p=>p.date),
               norm:  filtered.map(p=>p.val/base*100) };
    }).filter(Boolean);

  const allVals = [...aN, ...indexSeries.flatMap(s => s.norm)];
  const mn = Math.min(...allVals)-2, mx = Math.max(...allVals)+2;
  const rng = Math.max(mx-mn, 1);
  const cx = date => P + (date - startDate) / dateRange * (W - P*2);
  const cy = v    => H - P - (v - mn) / rng * (H - P*2);
  const aFinal = aN[n-1];
  const aColor = aFinal >= 100 ? '#34d399' : '#f87171';
  const gid  = 'gwk_' + id.replace(/[^a-z0-9]/gi,'');
  const aPts = accountPts.map(p => `${cx(p.date).toFixed(1)},${cy(p.val/baseVal*100).toFixed(1)}`).join(' ');
  const yearMarks = []; let lastYr = -1;
  accountPts.forEach(p => { const yr=p.date.getFullYear(); if(yr!==lastYr){yearMarks.push({yr,date:p.date});lastYr=yr;} });

  return (
    <div>
      <div style={{display:"flex",gap:14,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <svg width="18" height="4"><line x1="0" y1="2" x2="18" y2="2" stroke={aColor} strokeWidth="2.5"/></svg>
          <span style={{fontSize:12,color:aColor,fontWeight:700}}>
            {aFinal>=100?"+":""}{(aFinal-100).toFixed(1)}% votre actif
            {portfolioHistLoading&&<span style={{fontSize:10,opacity:0.6,marginLeft:4}}>⟳</span>}
          </span>
        </div>
        {indexSeries.map(s => {
          const sLast = s.norm[s.norm.length-1];
          return (
            <div key={s.key} style={{display:"flex",alignItems:"center",gap:5}}>
              <svg width="18" height="4"><line x1="0" y1="2" x2="18" y2="2" stroke={s.color} strokeWidth="2" strokeDasharray="4,3"/></svg>
              <span style={{fontSize:12,color:s.color,fontWeight:600}}>{s.label} {sLast>=100?"+":""}{(sLast-100).toFixed(1)}%</span>
            </div>
          );
        })}
        {indexHistLoading && activeIndices.filter(k => !indexHistData?.[k]).map(k => (
          <span key={k} style={{fontSize:11,color:T.textMuted,display:"flex",alignItems:"center",gap:3}}>
            <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>
            {INDICES[k]?.label}
          </span>
        ))}
        <span style={{fontSize:11,color:T.textMuted,marginLeft:"auto"}}>base 100</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:110,display:"block"}}>
        <defs>
          <linearGradient id={gid} x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={aColor} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={aColor} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <line x1={P} y1={cy(100)} x2={W-P} y2={cy(100)} stroke={T.border} strokeWidth="1" strokeDasharray="3,3"/>
        {yearMarks.map(({yr,date}) => (
          <g key={yr}>
            <line x1={cx(date).toFixed(1)} y1={P} x2={cx(date).toFixed(1)} y2={H-P} stroke={T.border} strokeWidth="1" strokeDasharray="2,4"/>
            <text x={cx(date).toFixed(1)} y={H-1} textAnchor="middle" fill={T.textFaint} fontSize="7">{yr}</text>
          </g>
        ))}
        <polygon points={`${cx(accountPts[0].date).toFixed(1)},${H-P} ${aPts} ${cx(accountPts[n-1].date).toFixed(1)},${H-P}`} fill={`url(#${gid})`}/>
        {indexSeries.map(s => (
          <polyline key={s.key}
            points={s.dates.map((d,i)=>`${cx(d).toFixed(1)},${cy(s.norm[i]).toFixed(1)}`).join(' ')}
            fill="none" stroke={s.color} strokeWidth="1.8" strokeDasharray="5,3" strokeLinejoin="round" opacity="0.85"/>
        ))}
        <polyline points={aPts} fill="none" stroke={aColor} strokeWidth="2.2" strokeLinejoin="round"/>
        <circle cx={cx(accountPts[n-1].date).toFixed(1)} cy={cy(aFinal).toFixed(1)} r="3.5" fill={aColor}/>
        {indexSeries.map(s => (
          <circle key={s.key}
            cx={cx(s.dates[s.dates.length-1]).toFixed(1)}
            cy={cy(s.norm[s.norm.length-1]).toFixed(1)}
            r="3" fill={s.color}/>
        ))}
      </svg>
    </div>
  );
}

// ── TickerInput avec autocomplete et fetch prix auto ─────────────────────────
function TickerInput({ value, onChange, onPriceFetched, onNameFetched, onCategoryFetched, T }) {
  const [suggestions, setSuggestions] = useState([]);
  const [showDrop,    setShowDrop]    = useState(false);
  const [fetching,    setFetching]    = useState(false);
  const inp = { background:T.bgInput, border:"1px solid "+(value?"#06b6d4":T.border), borderRadius:8, padding:"12px 14px", color:T.text, fontSize:16, width:"100%", outline:"none" };

  const mapCategory = (cat) => {
    if (!cat) return null;
    if (cat === "ETF PEA") return "ETF";
    if (["Actions","ETF","Crypto","Immobilier","Obligations","Livret","Autre"].includes(cat)) return cat;
    return "Autre";
  };

  const handleChange = (e) => {
    const v = e.target.value;
    onChange(v);
    if (v.length >= 1) {
      const q = v.toLowerCase();
      const matches = TICKER_DB.filter(item =>
        item.t.toLowerCase().includes(q) || item.n.toLowerCase().includes(q)
      ).slice(0, 6);
      setSuggestions(matches);
      setShowDrop(matches.length > 0);
    } else {
      setSuggestions([]);
      setShowDrop(false);
    }
  };

  // Quand un ticker est sélectionné ou saisi, on fetch le prix
  const applyTicker = async (ticker, knownName, knownCat) => {
    onChange(ticker);
    setShowDrop(false);
    setSuggestions([]);
    if (knownName && onNameFetched) onNameFetched(knownName);
    const mappedCat = mapCategory(knownCat);
    if (mappedCat && onCategoryFetched) onCategoryFetched(mappedCat);
    if (!ticker.trim()) return;
    setFetching(true);
    try {
      const result = await fetchPrice(ticker.trim());
      if (result?.price && result.price > 0) onPriceFetched(result.price);
    } catch(e) {}
    setFetching(false);
  };

  // Fetch aussi quand on quitte le champ (onBlur) si ticker valide
  const handleBlur = () => {
    setTimeout(() => setShowDrop(false), 180);
    if (value && value.trim().length >= 2) {
      const found = TICKER_DB.find(i => i.t.toUpperCase() === value.trim().toUpperCase());
      applyTicker(value.trim(), found?.n || null, found?.cat || null);
    }
  };

  const catColor = (cat) => ({ Actions:"#34d399", ETF:"#38bdf8", "ETF PEA":"#34d399", Crypto:"#a78bfa", Autre:"#94a3b8" }[cat]||"#94a3b8");

  return (
    <div style={{position:"relative"}}>
      <div style={{position:"relative"}}>
        <input
          type="text"
          placeholder="ex. CW8.PA, BTC-EUR, AAPL, lvmh..."
          value={value||""}
          onChange={handleChange}
          onFocus={()=>{ if(suggestions.length) setShowDrop(true); }}
          onBlur={handleBlur}
          style={{...inp, paddingRight: fetching ? "40px" : "14px"}}
          autoCapitalize="none"
          autoCorrect="off"
          spellCheck="false"
        />
        {fetching && (
          <div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:16,animation:"spin 0.8s linear infinite"}}>⟳</div>
        )}
      </div>
      {showDrop && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:300,background:T.bgSolid,border:"1px solid "+T.border,borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.5)",overflow:"hidden",marginTop:4}}>
          {suggestions.map((item,i) => (
            <div key={item.t} onMouseDown={()=>applyTicker(item.t, item.n, item.cat)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",borderBottom:i<suggestions.length-1?"1px solid "+T.borderSub:"none",background:T.bgInput}}
              onMouseEnter={e=>e.currentTarget.style.background=T.bgTabAct}
              onMouseLeave={e=>e.currentTarget.style.background=T.bgInput}
            >
              <span style={{fontSize:13,fontWeight:700,color:"#06b6d4",minWidth:90,fontFamily:"monospace"}}>{item.t}</span>

              <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:600,background:catColor(item.cat)+"22",color:catColor(item.cat)}}>{item.cat}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SyncSettingsModal ─────────────────────────────────────────────────────────
function SyncSettingsModal({ syncConfig, onClose, onSave, onSyncNow, syncing, lastSync, T }) {
  const [apiKey, setApiKey] = useState(syncConfig?.apiKey||"");
  const [binId,  setBinId]  = useState(syncConfig?.binId||"");
  const [status, setStatus] = useState("");
  const inp = {background:T.bgInput,border:"1px solid "+T.border,borderRadius:8,padding:"10px 12px",color:T.text,fontSize:14,outline:"none",width:"100%",fontFamily:"monospace"};

  const test = async () => {
    if (!apiKey.trim()) { setStatus("Entrez une clé API"); return; }
    setStatus("Test...");
    try {
      // POST un mini bin temporaire pour valider la clé — méthode la plus fiable
      const r = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: {"Content-Type":"application/json","X-Master-Key":apiKey.trim(),"X-Bin-Name":"test-validation","X-Bin-Private":"true"},
        body: JSON.stringify({test:true})
      });
      if (r.ok) {
        const j = await r.json();
        // Supprimer le bin de test immédiatement
        if (j.metadata?.id) fetch(`https://api.jsonbin.io/v3/b/${j.metadata.id}`, {method:"DELETE",headers:{"X-Master-Key":apiKey.trim()}}).catch(()=>{});
        setStatus("✓ Clé valide — connexion établie");
      } else if (r.status === 401 || r.status === 403) {
        setStatus("✗ Clé invalide ou non autorisée");
      } else {
        setStatus("✗ Erreur ("+r.status+") — vérifiez votre clé");
      }
    } catch { setStatus("✗ Erreur réseau"); }
  };

  const save = () => {
    onSave({apiKey:apiKey.trim(), binId:binId.trim()||null});
    onClose();
  };

  return (
    <div className="modal-overlay" style={{zIndex:200}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet" style={{background:T.bgSolid,border:"1px solid "+T.border}}>
        <div style={{width:36,height:4,background:T.border,borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <h2 style={{fontSize:18,fontFamily:"'Playfair Display',serif",color:T.text}}>Synchronisation & sécurité</h2>
          <button onClick={onClose} style={{background:T.bgInput,border:"none",borderRadius:8,width:32,height:32,color:T.textDim,fontSize:18,cursor:"pointer"}}>×</button>
        </div>
        <p style={{fontSize:12,color:T.textMuted,marginBottom:20,lineHeight:1.6}}>
          La synchronisation utilise <strong style={{color:T.textSub}}>JSONbin.io</strong> (gratuit).
          Créez un compte sur <a href="https://jsonbin.io" target="_blank" style={{color:"#06b6d4"}}>jsonbin.io</a>, puis copiez votre <em>Master Key</em> ci-dessous.
        </p>

        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Master Key (X-Master-Key)</label>
          <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="$2a$10$..." style={inp}/>
        </div>
        <div style={{marginBottom:8}}>
          <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Bin ID (auto-rempli après 1ère synchro)</label>
          <input type="text" value={binId} onChange={e=>setBinId(e.target.value)} placeholder="Laissez vide — créé automatiquement" style={inp}/>
        </div>
        {status&&<p style={{fontSize:12,color:status.startsWith("✓")?"#34d399":"#f87171",marginBottom:12}}>{status}</p>}
        {lastSync&&<p style={{fontSize:11,color:T.textMuted,marginBottom:12}}>Dernière sync : {lastSync.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</p>}

        <div style={{background:T.bgDeep,borderRadius:10,padding:"12px 16px",marginBottom:20,border:"1px solid "+T.border}}>
          <div style={{fontSize:11,color:T.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Comment obtenir votre Master Key</div>
          <ol style={{fontSize:12,color:T.textSub,paddingLeft:16,lineHeight:2,margin:0}}>
            <li>Créez un compte gratuit sur <a href="https://jsonbin.io" target="_blank" style={{color:"#06b6d4"}}>jsonbin.io</a></li>
            <li>Cliquez sur votre avatar → <strong>API Keys</strong></li>
            <li>Copiez la <strong>Master Key</strong> (commence par $2a$10$…)</li>
            <li>Collez-la ci-dessus, sauvegardez, puis cliquez Synchroniser</li>
          </ol>
        </div>

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={test} style={{flex:1,padding:12,background:T.bgInput,border:"1px solid "+T.border,borderRadius:10,color:T.textSub,cursor:"pointer",fontSize:13}}>Tester la clé</button>
          <button onClick={()=>{save();}} style={{flex:1,padding:12,background:T.bgInput,border:"1px solid "+T.border,borderRadius:10,color:T.textSub,cursor:"pointer",fontSize:13}}>Sauvegarder</button>
          <button onClick={()=>{save();onSyncNow();}} disabled={!apiKey.trim()||syncing}
            style={{flex:2,padding:12,background:"linear-gradient(135deg,#06b6d4,#0891b2)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:(!apiKey.trim()||syncing)?"not-allowed":"pointer",fontSize:13,opacity:(!apiKey.trim()||syncing)?0.5:1}}>

        </div>
      </div>
    </div>
  );
}

// ── AccountManagerModal ───────────────────────────────────────────────────────
function AccountManagerModal({ accounts, onClose, onSave, T }) {
  const [editing,  setEditing]  = useState(null);
  const [editName, setEditName] = useState("");
  const [newName,  setNewName]  = useState("");
  const inp = { background:T.bgInput, border:"1px solid "+T.border, borderRadius:8, padding:"10px 12px", color:T.text, fontSize:14, outline:"none", width:"100%" };

  const createAccount = () => {
    const name = newName.trim();
    if (!name) return;
    const color = ACCOUNT_COLORS[accounts.length % ACCOUNT_COLORS.length];
    onSave([...accounts, { id:Date.now(), name, color }]);
    setNewName("");
  };
  const renameAccount = (id) => {
    const name = editName.trim();
    if (!name) return;
    onSave(accounts.map(a => a.id===id ? {...a,name} : a));
    setEditing(null);
  };
  const deleteAccount = (id) => {
    if (!window.confirm("Supprimer ce compte ? Les investissements associés ne seront pas supprimés.")) return;
    onSave(accounts.filter(a => a.id!==id));
  };

  return (
    <div className="modal-overlay" style={{zIndex:200}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet" style={{background:T.bgSolid,border:"1px solid "+T.border}}>
        <div style={{width:36,height:4,background:T.border,borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:20,fontFamily:"'Playfair Display',serif",color:T.text}}>Gérer les comptes</h2>
          <button onClick={onClose} style={{background:T.bgInput,border:"none",borderRadius:8,width:32,height:32,color:T.textDim,fontSize:18,cursor:"pointer"}}>×</button>
        </div>
        {accounts.length===0&&<p style={{fontSize:13,color:T.textMuted,marginBottom:16}}>Aucun compte créé. Ajoutez-en un pour regrouper vos investissements.</p>}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {accounts.map(acc=>(
            <div key={acc.id} style={{display:"flex",alignItems:"center",gap:10,background:T.bgInput,borderRadius:10,padding:"10px 14px",border:"1px solid "+T.border}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:acc.color,flexShrink:0}}/>
              {editing===acc.id ? (
                <>
                  <input value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&renameAccount(acc.id)} autoFocus
                    style={{...inp,flex:1,padding:"6px 10px"}}/>
                  <button onClick={()=>renameAccount(acc.id)} style={{background:"#06b6d422",border:"1px solid #06b6d4",borderRadius:6,padding:"5px 12px",color:"#06b6d4",cursor:"pointer",fontSize:12,fontWeight:700}}>OK</button>
                  <button onClick={()=>setEditing(null)} style={{background:"transparent",border:"none",color:T.textDim,cursor:"pointer",fontSize:16,padding:"4px 6px"}}>✕</button>
                </>
              ) : (
                <>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:T.text}}>{acc.name}</span>
                  <button onClick={()=>{setEditing(acc.id);setEditName(acc.name);}}
                    style={{background:"transparent",border:"1px solid "+T.border,borderRadius:6,padding:"4px 10px",color:T.textSub,cursor:"pointer",fontSize:11}}>Renommer</button>
                  <button onClick={()=>deleteAccount(acc.id)}
                    style={{background:"transparent",border:"1px solid #f8717140",borderRadius:6,padding:"4px 10px",color:"#f87171",cursor:"pointer",fontSize:11}}>Suppr.</button>
                </>
              )}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createAccount()}
            placeholder="Nom du nouveau compte..." style={{...inp,flex:1}}/>
          <button onClick={createAccount}
            style={{padding:"10px 18px",background:"linear-gradient(135deg,#06b6d4,#0891b2)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14,flexShrink:0}}>
            Créer
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({ onClose, onSave, initial, accounts, T }) {
  const blank = { name:"", ticker:"", category:"ETF", accountId:null, quantity:"", buyPrice:"", date:new Date().toISOString().slice(0,10), currentPrice:"", notes:"" };
  const [form,         setForm]        = useState(initial||blank);
  const [priceStatus,  setPriceStatus] = useState(initial?.ticker ? "idle" : "idle");
  const set = (k)=>(e)=>setForm(f=>({...f,[k]:e.target.value}));
  const inp = { background:T.bgInput, border:"1px solid "+T.border, borderRadius:8, padding:"12px 14px", color:T.text, fontSize:16, width:"100%", outline:"none" };

  // Appelé quand le nom est trouvé via le ticker
  const handleNameFetched = (name) => {
    setForm(f => ({ ...f, name: f.name || name }));
  };

  // Appelé par TickerInput quand la catégorie est détectée
  const handleCategoryFetched = (cat) => {
    setForm(f => ({ ...f, category: cat }));
  };

  // Appelé par TickerInput quand le prix est récupéré
  const handlePriceFetched = (price) => {
    setForm(f => ({
      ...f,
      currentPrice: String(price),
      buyPrice: f.buyPrice || String(price),
    }));
    setPriceStatus("ok");
  };

  return (
    <div className="modal-overlay" style={{zIndex:200}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet" style={{background:T.bgSolid,border:"1px solid "+T.border}}>
        <div style={{width:36,height:4,background:T.border,borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:20,fontFamily:"'Playfair Display',serif",color:T.text}}>{initial?"Modifier":"Nouvel investissement"}</h2>
          <button onClick={onClose} style={{background:T.bgInput,border:"none",borderRadius:8,width:32,height:32,color:T.textDim,fontSize:18,cursor:"pointer"}}>x</button>
        </div>

        {/* Ticker en premier — déclenche le fetch du prix */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>
            Ticker
            {priceStatus==="ok" && <span style={{color:"#34d399",marginLeft:8,fontWeight:600,textTransform:"none"}}>✓ Prix recupere</span>}
          </label>
          <TickerInput
            value={form.ticker||""}
            onChange={v=>setForm(f=>({...f,ticker:v}))}
            onPriceFetched={handlePriceFetched}
            onNameFetched={handleNameFetched}
            onCategoryFetched={handleCategoryFetched}
            T={T}
          />
          <div style={{fontSize:11,color:T.textMuted,marginTop:5}}>
            Selectionnez un ticker — le prix actuel se remplit automatiquement
          </div>
        </div>

        {[["Nom","name","text","ex. PEA Amundi MSCI World"],
          ["Quantite","quantity","number","ex. 10"],
          ["Prix achat (EUR)","buyPrice","number","ex. 420"],
          ["Date achat","date","date",""]
        ].map(([lbl,k,t,ph])=>(
          <div key={k} style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>{lbl}</label>
            <input type={t} placeholder={ph} value={form[k]} onChange={set(k)} style={{...inp, ...(t==="date"?{width:"100%",maxWidth:"100%",minWidth:0,boxSizing:"border-box"}:{})}}/>
          </div>
        ))}

        {/* Prix actuel — lecture seule, rempli automatiquement */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>
            Prix actuel (EUR)
            {priceStatus==="ok"
              ? <span style={{color:"#34d399",marginLeft:6,fontWeight:600,textTransform:"none",fontSize:10}}>✓ mis a jour automatiquement</span>
              : <span style={{color:T.textFaint,marginLeft:6,fontWeight:400,textTransform:"none",fontSize:10}}>rempli automatiquement via ticker</span>
            }
          </label>
          <div style={{
            ...inp,
            borderColor: priceStatus==="ok" ? "#34d399" : T.border,
            background: T.bgDeep,
            color: form.currentPrice ? T.text : T.textFaint,
            cursor: "not-allowed",
            userSelect: "none",
            display: "flex",
            alignItems: "center",
            gap: 8,
          }}>
            <span style={{flex:1, fontSize:16}}>
              {form.currentPrice ? parseFloat(form.currentPrice).toLocaleString("fr-FR", {minimumFractionDigits:2, maximumFractionDigits:2}) + " €" : "— en attente du ticker —"}
            </span>
            {priceStatus==="ok" && <span style={{fontSize:14}}>✓</span>}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Categorie</label>
          <select value={form.category} onChange={set("category")} style={{...inp,appearance:"none"}}>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        {accounts.length>0&&(
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Compte</label>
            <select value={form.accountId?String(form.accountId):""} onChange={e=>setForm(f=>({...f,accountId:e.target.value?Number(e.target.value):null}))} style={{...inp,appearance:"none"}}>
              <option value="">— Non classé —</option>
              {accounts.map(a=>(
                <option key={a.id} value={String(a.id)}>{a.name}</option>
              ))}
            </select>
          </div>
        )}
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:11,color:T.textDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Notes</label>
          <textarea value={form.notes} onChange={set("notes")} rows={2} style={{...inp,resize:"none"}}/>
        </div>

        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:14,background:T.bgInput,border:"1px solid "+T.border,borderRadius:10,color:T.textSub,cursor:"pointer",fontSize:15}}>Annuler</button>
          <button onClick={()=>{
            if(!form.name||!form.quantity||!form.buyPrice){alert("Champs obligatoires manquants.");return;}
            onSave({...form,id:initial?.id||Date.now(),quantity:parseFloat(form.quantity),buyPrice:parseFloat(form.buyPrice),currentPrice:parseFloat(form.currentPrice)||parseFloat(form.buyPrice),ticker:(form.ticker||"").trim()});
            onClose();
          }} style={{flex:2,padding:14,background:"linear-gradient(135deg,#06b6d4,#0891b2)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:15}}>
            {initial?"Mettre a jour":"Ajouter"}
          </button>
        </div>
      </div>
    </div>
  );
}

  const syncConfigRef = React.useRef(syncConfig);
  syncConfigRef.current = syncConfig;
  const [indexHistData,     setIndexHistData]     = useState({});
  const [indexHistLoading,  setIndexHistLoading]  = useState(false);
  const [portfolioHistData, setPortfolioHistData] = useState({});
  const [portfolioHistLoading,setPortfolioHistLoading]=useState(false);
  const [donutDetailed,setDonutDetailed]= useState(false);

  const T = dark === "light" ? LIGHT : dark === "black" ? BLACK : DARK;
  const cycleTheme = () => setDark(d => THEMES[(THEMES.indexOf(d) + 1) % THEMES.length]);
  const M = (v) => privacy ? HIDDEN : fmtEur(v);

  const toggleIdx = (key) => setActiveIdx(prev =>
    prev.includes(key) ? prev.filter(k=>k!==key) : [...prev,key]
  );

  useEffect(()=>{
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) { setInvestments(JSON.parse(s)); setReady(true); }
      else {
        const old = localStorage.getItem("investments-data-v2");
        if (old) { setInvestments(JSON.parse(old).map(i=>({...i,ticker:i.ticker||""}))); setReady(true); }
        else { setInvestments(PRELOADED); setReady(true); }
      }
    } catch(e) { setInvestments(PRELOADED); setReady(true); }
    try { const acc = localStorage.getItem(ACCOUNTS_KEY); if (acc) setAccounts(JSON.parse(acc)); } catch(e) {}
    try { const h = localStorage.getItem(HIST_KEY); if (h) setHistUserData(JSON.parse(h)); } catch(e) {}
    try { const sc = localStorage.getItem(SYNC_KEY); if (sc) setSyncConfig(JSON.parse(sc)); } catch(e) {}
  },[]);

  // Sync cloud au chargement (pull initial)
  useEffect(()=>{
    if (syncConfig?.apiKey && syncConfig?.binId) doCloudPull(syncConfig);
  },[]);

  // Auto-pull quand l'utilisateur revient sur l'onglet ou focus la fenêtre
  useEffect(()=>{
    const pull = () => {
      const cfg = syncConfigRef.current;
      if (!cfg?.apiKey || !cfg?.binId || syncing) return;
      doCloudPull(cfg);
    };
    const onVis = () => { if (document.visibilityState === 'visible') pull(); };
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('focus', pull);
    return () => {
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('focus', pull);
    };
  },[]);

  // Auto-pull toutes les 5 minutes (polling léger)
  useEffect(()=>{
    if (!syncConfig?.apiKey || !syncConfig?.binId) return;
    const id = setInterval(()=> {
      if (!syncing) doCloudPull(syncConfigRef.current);
    }, 5 * 60 * 1000);
    return () => clearInterval(id);
  },[syncConfig?.binId]);

  // useEffect 1 : fetch hebdomadaire des INDICES (se relance si période/sélection change)
  useEffect(()=>{
    if (tab !== 'history') return;
    let cancelled = false;
    setIndexHistLoading(true);
    setIndexHistData({});
    const range = intervalToYahooRange(interval);
    Promise.all(
      activeIdx.map(async key => {
        const ticker = YAHOO_IDX_TICKERS[key];
        if (!ticker) return [key, null];
        const data = await fetchWeeklyHistory(ticker, range);
        return [key, data];
      })
    ).then(results => {
      if (cancelled) return;
      const nd = {};
      results.forEach(([k,d]) => { if (d) nd[k]=d; });
      setIndexHistData(nd);
      setIndexHistLoading(false);
    });
    return () => { cancelled = true; };
  }, [tab, interval, activeIdx.join(',')]);

  // useEffect 2 : fetch cours historiques de chaque actif du portefeuille (MAX, 1 seule fois)
  useEffect(()=>{
    if (tab !== 'history' || !investments.length) return;
    const tickers = [...new Set(investments.map(inv => inv.ticker?.trim()).filter(Boolean))];
    const missing  = tickers.filter(t => !portfolioHistData[t]);
    if (!missing.length) return;
    let cancelled = false;
    setPortfolioHistLoading(true);
    Promise.all(missing.map(async ticker => {
      const data = await fetchTickerWeeklyHistory(ticker);
      return [ticker, data];
    })).then(results => {
      if (cancelled) return;
      const nd = {...portfolioHistData};
      results.forEach(([t,d]) => { if (d) nd[t]=d; });
      setPortfolioHistData(nd);
      setPortfolioHistLoading(false);
    });
    return () => { cancelled = true; };
  }, [tab, investments.length]);

  const doCloudPull = async (cfg) => {
    if (!cfg?.apiKey || !cfg?.binId) return;
    setSyncing(true);
    try {
      const remote = await cloudPull(cfg.apiKey, cfg.binId);
      if (remote?.investments) {
        setInvestments(remote.investments);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(remote.investments)); } catch(e){}
      }
      if (remote?.accounts) {
        setAccounts(remote.accounts);
        try { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(remote.accounts)); } catch(e){}
      }
      if (remote?.histUserData) {
        setHistUserData(remote.histUserData);
        try { localStorage.setItem(HIST_KEY, JSON.stringify(remote.histUserData)); } catch(e){}
      }
      setLastSync(new Date());
    } catch(e) { console.warn("Pull failed", e); }
    setSyncing(false);
  };

  const doCloudPush = useCallback(async (cfg, inv, acc, hist) => {
    if (!cfg?.apiKey) return;
    try {
      const payload = { investments:inv, accounts:acc, histUserData:hist, updatedAt:new Date().toISOString() };
      const newBinId = await cloudPush(cfg.apiKey, cfg.binId||null, payload);
      if (newBinId !== cfg.binId) {
        const updated = {...cfg, binId:newBinId};
        setSyncConfig(updated);
        try { localStorage.setItem(SYNC_KEY, JSON.stringify(updated)); } catch(e){}
      }
      setLastSync(new Date());
    } catch(e) { console.warn("Push failed", e); }
  }, []);

  const persist = (list) => {
    setInvestments(list);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch(e) {}
    doCloudPush(syncConfig, list, accounts, histUserData);
  };
  const persistAccounts = (list) => {
    setAccounts(list);
    try { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(list)); } catch(e) {}
    doCloudPush(syncConfig, investments, list, histUserData);
  };
  const persistHist = (data) => {
    setHistUserData(data);
    try { localStorage.setItem(HIST_KEY, JSON.stringify(data)); } catch(e) {}
    doCloudPush(syncConfig, investments, accounts, data);
  };

  const exportToExcel = useCallback(() => {
    const XLS = window.XLSX;
    if (!XLS) { alert("SheetJS non disponible."); return; }

    const wb = XLS.utils.book_new();
    const fmt = (d) => new Date(d).toLocaleDateString("fr-FR");
    const accName = (id) => id ? (accounts.find(a=>a.id===id)?.name||"Non classé") : "Non classé";

    // ── Feuille 1 : Portefeuille ──────────────────────────────────────────────
    const header1 = ["Nom","Ticker","Catégorie","Compte","Quantité","Prix achat (€)","Valeur achat (€)","Prix actuel (€)","Valeur actuelle (€)","P&L (€)","Performance (%)","Date achat","Notes"];
    const rows1 = investments.map(inv => {
      const vAchat  = inv.buyPrice * inv.quantity;
      const vActuel = inv.currentPrice * inv.quantity;
      const pl      = vActuel - vAchat;
      const perf    = vAchat ? ((vActuel - vAchat) / vAchat) * 100 : 0;
      return [
        inv.name, inv.ticker||"", inv.category, accName(inv.accountId),
        inv.quantity, inv.buyPrice, vAchat,
        inv.currentPrice, vActuel, pl,
        Math.round(perf * 10) / 10,
        fmt(inv.date), inv.notes||""
      ];
    });
    const ws1 = XLS.utils.aoa_to_sheet([header1, ...rows1]);
    // Totaux
    const n1 = rows1.length;
    const totInvested = investments.reduce((s,i)=>s+i.buyPrice*i.quantity, 0);
    const totCurrent  = investments.reduce((s,i)=>s+i.currentPrice*i.quantity, 0);
    const totPL       = totCurrent - totInvested;
    const totPerf     = totInvested ? ((totCurrent-totInvested)/totInvested)*100 : 0;
    ws1["!data"] = ws1["!data"] || [];
    XLS.utils.sheet_add_aoa(ws1, [
      [],
      ["TOTAL","","","", "", "", totInvested, "", totCurrent, totPL, Math.round(totPerf*10)/10]
    ], { origin: n1 + 2 });
    ws1["!cols"] = [22,10,12,16,9,14,16,14,18,12,16,12,28].map(w=>({wch:w}));
    XLS.utils.book_append_sheet(wb, ws1, "Portefeuille");

    // ── Feuille 2 : Résumé par compte ─────────────────────────────────────────
    const header2 = ["Compte","Nb positions","Valeur investie (€)","Valeur actuelle (€)","P&L (€)","Performance (%)"];
    const groups = accounts.length > 0
      ? [
          ...accounts.map(acc => {
            const invs = investments.filter(i=>i.accountId===acc.id);
            const vi = invs.reduce((s,i)=>s+i.buyPrice*i.quantity,0);
            const va = invs.reduce((s,i)=>s+i.currentPrice*i.quantity,0);
            return [acc.name, invs.length, vi, va, va-vi, vi ? Math.round(((va-vi)/vi)*10000)/100 : 0];
          }),
          (()=>{
            const invs = investments.filter(i=>!i.accountId||!accounts.find(a=>a.id===i.accountId));
            const vi = invs.reduce((s,i)=>s+i.buyPrice*i.quantity,0);
            const va = invs.reduce((s,i)=>s+i.currentPrice*i.quantity,0);
            return ["Non classé", invs.length, vi, va, va-vi, vi ? Math.round(((va-vi)/vi)*10000)/100 : 0];
          })()
        ]
      : [["(aucun compte créé)", investments.length, totInvested, totCurrent, totPL, Math.round(totPerf*10)/10]];
    const ws2 = XLS.utils.aoa_to_sheet([header2, ...groups]);
    ws2["!cols"] = [20,14,20,20,14,16].map(w=>({wch:w}));
    XLS.utils.book_append_sheet(wb, ws2, "Résumé comptes");

    // ── Feuille 3 : Historique par compte (1er et 15 de chaque mois) ──────────
    const N_HD = HIST_DATES.length;

    // Série de valeur alignée sur HIST_DATES pour un investissement
    const getSeriesExport = (inv) => {
      if (HISTORY[inv.name]) {
        const s = HISTORY[inv.name];
        const pad = N_HD - s.length;
        return pad > 0 ? [...Array(pad).fill(0), ...s] : s;
      }
      const buyDate = new Date(inv.date);
      let startIdx = N_HD - 1;
      for (let i = 0; i < N_HD; i++) {
        if (HIST_DATES[i] >= buyDate) { startIdx = i; break; }
      }
      const buyVal = inv.buyPrice * inv.quantity;
      const curVal = inv.currentPrice * inv.quantity;
      const span = N_HD - startIdx;
      return Array.from({length: N_HD}, (_, i) => {
        if (i < startIdx) return 0;
        const t = span <= 1 ? 1 : (i - startIdx) / (span - 1);
        return Math.round((buyVal + (curVal - buyVal) * t) * 100) / 100;
      });
    };

    // Interpoler la valeur d'un tableau de series (summed) pour une date cible
    const interpValue = (summedSeries, targetDate) => {
      // Trouver les deux points HIST_DATES encadrant la date cible
      let lo = -1, hi = -1;
      for (let i = 0; i < N_HD; i++) {
        if (HIST_DATES[i] <= targetDate) lo = i;
        if (HIST_DATES[i] >= targetDate && hi === -1) hi = i;
      }
      if (lo < 0 && hi < 0) return 0;
      if (lo < 0) return summedSeries[hi];
      if (hi < 0 || lo === hi) return summedSeries[lo];
      const span = HIST_DATES[hi] - HIST_DATES[lo];
      if (span === 0) return summedSeries[lo];
      const t = (targetDate - HIST_DATES[lo]) / span;
      return Math.round((summedSeries[lo] + (summedSeries[hi] - summedSeries[lo]) * t));
    };

    // Construire la série totale et par compte
    const buildSummedSeries = (invs) => {
      if (!invs.length) return Array(N_HD).fill(0);
      const series = invs.map(getSeriesExport);
      return Array.from({length: N_HD}, (_, i) => series.reduce((s, arr) => s + (arr[i] || 0), 0));
    };

    const totalSeries = buildSummedSeries(investments);
    const accountSeries = accounts.map(acc => ({
      name: acc.name,
      series: buildSummedSeries(investments.filter(i => i.accountId === acc.id)),
    }));
    const unclassedInvs = investments.filter(i => !i.accountId || !accounts.find(a => a.id === i.accountId));
    if (unclassedInvs.length > 0) {
      accountSeries.push({ name: "Non classé", series: buildSummedSeries(unclassedInvs) });
    }

    // Générer toutes les dates 1er et 15 depuis la date du 1er investissement jusqu'à aujourd'hui
    const firstDate = investments.reduce((min, inv) => {
      const d = new Date(inv.date);
      return d < min ? d : min;
    }, new Date());
    firstDate.setDate(1);

    const today = new Date();
    const biDates = [];
    const cur = new Date(firstDate);
    while (cur <= today) {
      biDates.push(new Date(cur));
      if (cur.getDate() === 1) cur.setDate(15);
      else { cur.setMonth(cur.getMonth() + 1); cur.setDate(1); }
    }

    const accNames = accountSeries.map(a => a.name);
    const header3 = ["Date", ...accNames, "Total"];
    const histRows3 = biDates.map(d => {
      const dateStr = d.toLocaleDateString("fr-FR");
      const accVals = accountSeries.map(a => interpValue(a.series, d) || "");
      const total = interpValue(totalSeries, d) || "";
      return [dateStr, ...accVals, total];
    });

    const ws3 = XLS.utils.aoa_to_sheet([header3, ...histRows3]);
    ws3["!cols"] = [12, ...accNames.map(() => 18), 14].map(w => ({wch: w}));
    XLS.utils.book_append_sheet(wb, ws3, "Historique");

    // ── Téléchargement ────────────────────────────────────────────────────────
    const date = new Date().toISOString().slice(0,10);
    XLS.writeFile(wb, `portfolio_${date}.xlsx`);
  }, [investments, accounts, histUserData]);

  // Fusionner l'historique statique + points utilisateur pour un actif
  const getAssetHistory = useCallback((name) => {
    const staticPts = (HISTORY[name] || []).map((v, i) => ({
      d: HIST_DATES[Math.min(i, HIST_DATES.length-1)],
      v,
    }));
    const extra = (histUserData[name]?.extra || []).map(p => ({
      d: new Date(p.d),
      v: p.v,
    }));
    const merged = [...staticPts, ...extra].sort((a, b) => a.d - b.d);
    // Dédupliquer : si deux points à ±1 jour, garder le dernier (point user)
    const deduped = [];
    for (const pt of merged) {
      const last = deduped[deduped.length-1];
      if (last && Math.abs(last.d - pt.d) < 86400000 * 2) {
        deduped[deduped.length-1] = pt;
      } else {
        deduped.push(pt);
      }
    }
    return { dates: deduped.map(p=>p.d), vals: deduped.map(p=>p.v) };
  }, [histUserData]);
  const addOrUpdate = (inv) => persist(investments.find(i=>i.id===inv.id)?investments.map(i=>i.id===inv.id?inv:i):[...investments,inv]);
  const remove      = (id)  => persist(investments.filter(i=>i.id!==id));

  const refreshPrices = useCallback(async () => {
    const toUpdate = investments.filter(i => i.ticker && i.ticker.trim());
    if (!toUpdate.length) { alert("Aucun ticker renseigne. Modifiez vos investissements pour ajouter un ticker."); return; }
    setRefreshing(true);

    const statusMap = {};
    toUpdate.forEach(inv => { statusMap[inv.id] = "loading"; });
    setPriceStatus({...statusMap});

    // Utilise fetchAllPrices avec les 3 sources
    const results = await fetchAllPrices(
      toUpdate,
      (id, state) => { statusMap[id] = state; setPriceStatus({...statusMap}); }
    );

    // Appliquer les prix récupérés au state React + localStorage
    const nbOk = Object.values(results).filter(r => r.ok).length;
    if (nbOk > 0) {
      setInvestments(prev => {
        const next = prev.map(inv => {
          const r = results[inv.id];
          return (r?.ok && r.price > 0)
            ? { ...inv, currentPrice: Math.round(r.price * 100) / 100 }
            : inv;
        });
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch(e) {}
        return next;
      });
    }

    setRefreshing(false);
    setLastRefresh(new Date());
    alert(nbOk + " prix mis a jour sur " + toUpdate.length + " tickers." +
      (nbOk < toUpdate.length ? "\n\nEchecs : " + toUpdate.filter(i => !results[i.id]?.ok).map(i => i.ticker).join(", ") : ""));
  }, [investments]);

  const filtered = investments
    .filter(i=>filter==="Tous"||i.category===filter)
    .filter(i=>i.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sort==="date")  return new Date(b.date)-new Date(a.date);
      if(sort==="value") return b.currentPrice*b.quantity-a.currentPrice*a.quantity;
      if(sort==="perf")  return pct(b.currentPrice,b.buyPrice)-pct(a.currentPrice,a.buyPrice);
      return 0;
    });

  const totalInvested = investments.reduce((s,i)=>s+i.buyPrice*i.quantity,0);
  const totalCurrent  = investments.reduce((s,i)=>s+i.currentPrice*i.quantity,0);
  const totalGain     = totalCurrent-totalInvested;
  const totalPct      = pct(totalCurrent,totalInvested);
  const donutData     = CATEGORIES.map(cat=>({label:cat,color:CAT_COLORS[cat],value:investments.filter(i=>i.category===cat).reduce((s,i)=>s+i.currentPrice*i.quantity,0)})).filter(d=>d.value>0);
  const tickerCount   = investments.filter(i=>i.ticker&&i.ticker.trim()).length;

  if (!ready) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#07111a",color:"#9ab0c8"}}>Chargement...</div>;

  const card = {background:T.bgCard,border:"1px solid "+T.border,borderRadius:14};

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'DM Sans',sans-serif"}}>

      {/* ═══ HEADER ═══ */}
      <div style={{background:T.bgHeader,borderBottom:"1px solid "+T.border,padding:"16px max(20px, env(safe-area-inset-right)) 16px max(20px, env(safe-area-inset-left))",paddingTop:"calc(16px + env(safe-area-inset-top))"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div>
            <h1 style={{fontSize:18,fontFamily:"'Syne',sans-serif",fontWeight:800,background:"linear-gradient(135deg,#06b6d4,#0891b2)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.5px"}}>Mon Portfolio</h1>
            <p style={{fontSize:11,color:T.textMuted,marginTop:2}}>
              {syncing
                ? <span style={{color:"#06b6d4"}}>↑↓ Synchronisation...</span>
                : lastSync
                  ? "Sync "+lastSync.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})
                  : "Données locales"}
              {privacy&&<span style={{color:"#38bdf8",fontWeight:600,marginLeft:8}}>· Mode discret</span>}
            </p>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={refreshPrices} disabled={refreshing} title={refreshing?"En cours...":"Actualiser les prix ("+tickerCount+")"}
              style={{display:"flex",alignItems:"center",justifyContent:"center",width:38,height:38,borderRadius:10,border:"1px solid",cursor:refreshing?"not-allowed":"pointer",flexShrink:0,borderColor:refreshing?T.border:"#06b6d4",background:refreshing?T.bgDeep:"#06b6d422"}}>
              <span style={{display:"inline-block",animation:refreshing?"spin 1s linear infinite":"none",fontSize:16,color:refreshing?T.textDim:"#06b6d4",lineHeight:1}}>↻</span>
            </button>
            {/* Bouton mode discret — icône oeil SVG flat */}
            <button onClick={()=>setPrivacy(p=>!p)}
              title={privacy?"Afficher les montants":"Masquer les montants"}
              style={{display:"flex",alignItems:"center",justifyContent:"center",width:38,height:38,borderRadius:10,border:"1px solid",cursor:"pointer",flexShrink:0,
                background: privacy?"#0f2040":"transparent",
                borderColor: privacy?"#38bdf8":T.border,
              }}>
              {privacy ? (
                // Oeil barré — montants masqués
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              ) : (
                // Oeil ouvert — montants visibles
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              )}
            </button>

            {/* Bouton thème — cycle Nuit → Noir → Jour */}
            <button onClick={cycleTheme}
              title={dark==="dark"?"Passer en noir OLED":dark==="black"?"Passer en mode jour":"Passer en mode nuit"}
              style={{display:"flex",alignItems:"center",justifyContent:"center",width:38,height:38,borderRadius:10,border:"1px solid "+T.border,cursor:"pointer",background:T.bgInput,flexShrink:0}}>
              {dark === "light" ? (
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={T.textSub} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              ) : dark === "dark" ? (
                <svg width="17" height="17" viewBox="0 0 24 24" fill={T.textSub} stroke={T.textSub} strokeWidth="1.5">
                  <circle cx="12" cy="12" r="9"/>
                </svg>
              ) : (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.textSub} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="5"/>
                  <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                  <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
              )}
            </button>
            <button
              onClick={()=>{ if(syncConfig?.binId){ doCloudPull(syncConfig); } else { setSyncModal(true); } }}
              onContextMenu={e=>{e.preventDefault();setSyncModal(true);}}

            {(()=>{
              const N = HIST_DATES.length;

              // Série réelle ou synthétique alignée sur HIST_DATES (longueur N)
              const getSeries = (inv) => {
                if (HISTORY[inv.name]) {
                  // Padder à gauche si la série est plus courte que N
                  const s = HISTORY[inv.name];
                  const pad = N - s.length;
                  return pad > 0 ? [...Array(pad).fill(0), ...s] : s;
                }
                const buyDate = new Date(inv.date);
                let startIdx = N - 1;
                for (let i = 0; i < N; i++) {
                  if (HIST_DATES[i] >= buyDate) { startIdx = i; break; }
                }
                // Garantir au moins 2 points pour que le graphique s'affiche
                startIdx = Math.min(startIdx, N - 2);
                const buyVal = inv.buyPrice * inv.quantity;
                const curVal = inv.currentPrice * inv.quantity;
                const span = N - startIdx;
                return Array.from({length: N}, (_, i) => {
                  if (i < startIdx) return 0;
                  const t = span <= 1 ? 1 : (i - startIdx) / (span - 1);
                  return Math.round((buyVal + (curVal - buyVal) * t) * 100) / 100;
                });
              };

              // Retourne un tableau de longueur N (aligné HIST_DATES) + index de début réel
              const buildHistory = (invs) => {
                if (!invs.length) return null;
                const series = invs.map(getSeries);
                const summed = Array.from({length: N}, (_, i) => series.reduce((s, arr) => s + (arr[i] || 0), 0));
                const firstNonZero = summed.findIndex(v => v > 0);
                if (firstNonZero < 0) return null;
                return { vals: summed, histStart: firstNonZero };
              };

              const totalHistObj = buildHistory(investments);
              const accountGroups = accounts.map(acc => {
                const invs = investments.filter(i => i.accountId === acc.id);
                const h = buildHistory(invs);
                return h ? { acc, ...h, invs } : null;
              }).filter(Boolean);

              if (!totalHistObj && accountGroups.length === 0) return null;

              const renderAccountCard = ({acc, vals, histStart, invs, isTotal}) => {
                // ── Données hebdomadaires réelles (cours historiques ou interpolation) ──
                const allInvs = isTotal ? investments : (invs||[]);
                const weeklyPts = buildWeeklyAccountValsFromHistory(allInvs, portfolioHistData, interval);

                // Valeur finale = cours actuels × quantités
                const wFinal = allInvs.reduce((s,inv) =>
                  s + ((inv.currentPrice ?? inv.buyPrice ?? 0) * (inv.quantity||0)), 0);
                // Valeur de début de période = premier point hebdomadaire
                const wStart = weeklyPts.length >= 2 ? weeklyPts[0].val : wFinal;
                const gain = wFinal - wStart;
                const perf = pct(wFinal, wStart);
                const pos  = gain >= 0;
                // Garder compatibilité avec l'ancien système pour les vérifications de base
                const { vals: sliced, startIdx } = sliceByInterval(vals, interval);
                const firstReal = sliced.findIndex(v => v > 0);
                if (firstReal < 0 && weeklyPts.length < 1) return null;
                const slicedReal = sliced.slice(Math.max(firstReal,0));
                const nR = slicedReal.length;
                // Labels date : depuis histStart ou depuis startIdx, jusqu'à la fin
                const realStartIdx = Math.max(histStart, startIdx + firstReal);
                const startLabel = (() => {
                  const iv2 = INTERVALS.find(i=>i.key===interval);
                  if (!iv2 || iv2.key==='MAX') {
                    const allInvs = isTotal ? investments : (invs||[]);
                    const minDate = allInvs.filter(i=>i.date).reduce((m,i)=>{const d=new Date(i.date);return d<m?d:m;},new Date());
                    return minDate.toLocaleDateString('fr-FR',{month:'short',year:'numeric'});
                  }
                  if (iv2.ytd) return `jan. ${new Date().getFullYear()}`;
                  const d=new Date(); d.setMonth(d.getMonth()-iv2.months);
                  return d.toLocaleDateString('fr-FR',{month:'short',year:'numeric'});
                })();
                const endLabel = new Date().toLocaleDateString('fr-FR',{month:'short',year:'numeric'});
                const color  = isTotal ? "#06b6d4" : acc.color;
                const cardId = isTotal ? "__total__" : "acc"+acc.id;
                const name   = isTotal ? "Total portefeuille" : acc.name;
                const borderStyle = isTotal ? {borderColor:"rgba(255,255,255,0.22)"} : {borderColor: acc.color+"44"};
                return (
                  <div key={cardId} style={{...card,...borderStyle,padding:"16px 18px",marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}/>
                          <span style={{fontWeight:700,fontSize:15,color:T.text}}>{name}</span>
                          {invs&&<span style={{fontSize:11,color:T.textMuted}}>{invs.length} pos.</span>}
                        </div>
                        <div style={{fontSize:11,color:T.textMuted,marginTop:3}}>{startLabel} → {endLabel}</div>
                      </div>
                      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:1}}>Valeur finale</div>
                          <div style={{fontSize:15,fontWeight:700,color:T.text}}>{M(wFinal)}</div>
                          <div style={{fontSize:12,fontWeight:700,color:pos?"#34d399":"#f87171"}}>{privacy?HIDDEN:(gain>=0?"+":"")+fmtEur(gain)} ({perf.toFixed(1)}%)</div>
                        </div>
                        {Object.entries(INDICES).filter(([k])=>activeIdx.includes(k)).map(([key,idx])=>{
                          const liveHist = indexHistData?.[key];
                          let ip;
                          if (liveHist?.length >= 2) {
                            ip = pct(liveHist[liveHist.length-1].val, liveHist[0].val);
                          } else {
                            const {vals:si}=sliceByInterval(idx.data,interval);
                            ip=pct(si[si.length-1],si[0]);
                          }
                          return (
                            <div key={key} style={{textAlign:"right"}}>
                              <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:1}}>{idx.label}</div>
                              <div style={{fontSize:14,fontWeight:700,color:idx.color}}>{ip>=0?"+":""}{ip.toFixed(1)}%</div>
                              <div style={{fontSize:10,fontWeight:600,color:perf>ip?"#34d399":"#f87171"}}>{perf>ip?"Sur":"Sous"}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <ComparisonChartWeekly
                          id={cardId}
                          accountPts={buildWeeklyAccountValsFromHistory(isTotal ? investments : (invs||[]), portfolioHistData, interval)}
                          indexHistData={indexHistData}
                          activeIndices={activeIdx}
                          indexHistLoading={indexHistLoading}
                          portfolioHistLoading={portfolioHistLoading}
                          T={T}
                        />
                  </div>
                );
              };

              return (
                <>
                  <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:T.text,marginBottom:4,marginTop:8}}>Évolution par compte</h2>
                  <p style={{fontSize:12,color:T.textMuted,marginBottom:14}}>Comparaison normalisée base 100 — intervalle : {INTERVALS.find(i=>i.key===interval)?.label}</p>
                  {totalHistObj && renderAccountCard({...totalHistObj, acc:null, invs:null, isTotal:true})}
                  {accountGroups.map(g => renderAccountCard({...g, isTotal:false}))}
                </>
              );
            })()}

          </div>
        )}
      </div>

      {modal&&<Modal initial={modal==="add"?null:modal} onClose={()=>setModal(null)} onSave={addOrUpdate} accounts={accounts} T={T}/>}
      {accountModal&&<AccountManagerModal accounts={accounts} onClose={()=>setAccountModal(false)} onSave={persistAccounts} T={T}/>}
      {syncModal&&(
        <SyncSettingsModal
          syncConfig={syncConfig}
          onClose={()=>setSyncModal(false)}
          onSave={(cfg)=>{
            setSyncConfig(cfg);
            try { localStorage.setItem(SYNC_KEY, JSON.stringify(cfg)); } catch(e){}
          }}
          onSyncNow={()=>{ setSyncModal(false); doCloudPull(syncConfigRef.current||syncConfig); }}
          syncing={syncing}
          lastSync={lastSync}
          T={T}
        />
      )}
      {histPointModal&&(
        <HistoryPointModal
          assetName={histPointModal}
          existingPoints={histUserData[histPointModal]?.extra||[]}
          onClose={()=>setHistPointModal(null)}
          onSave={(point, deleteIdx)=>{
            const current = histUserData[histPointModal]||{};
            const extra   = [...(current.extra||[])];
            if (point === null && deleteIdx !== undefined) {
              extra.splice(deleteIdx, 1);
            } else if (point) {
              extra.push(point);
              extra.sort((a,b)=>new Date(a.d)-new Date(b.d));
            }
            persistHist({...histUserData,[histPointModal]:{...current,extra}});
          }}
          T={T}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
